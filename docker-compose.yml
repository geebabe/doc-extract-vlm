version: "3.8"

services:
  ocr-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ocr-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - VLLM_BASE_URL=http://qwen-model:8000/v1
      - VLLM_MODEL_NAME=${MODEL_ID:-Qwen/Qwen3-VL-2B-Instruct}
      - VLLM_API_KEY=none
    depends_on:
      qwen-model:
        condition: service_healthy
    networks:
      - ocr-network

  qwen-model:
    image: vllm/vllm-openai:latest
    container_name: qwen-model-service
    restart: unless-stopped
    environment:
      - HF_TOKEN
      - MODEL_ID=${MODEL_ID:-Qwen/Qwen3-VL-2B-Instruct}
    command: >
      --model ${MODEL_ID:-Qwen/Qwen3-VL-2B-Instruct}
      --max-model-len 16384
      --max-num-batched-tokens 16384
      --gpu-memory-utilization 0.9
      --trust-remote-code
      --enforce-eager
      --tensor-parallel-size 1
    shm_size: '8gb'
    ports:
      - "8001:8000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - ocr-network

networks:
  ocr-network:
    driver: bridge
