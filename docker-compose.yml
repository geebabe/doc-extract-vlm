version: "3.8"

services:
  ocr-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ocr-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - VLLM_BASE_URL=http://vintern-model:8000/v1
      - VLLM_MODEL_NAME=${MODEL_ID:-5CD-AI/Vintern-1B-v3_5}
      - VLLM_API_KEY=none
    depends_on:
      vintern-model:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - ocr-network

  vintern-model:
    image: vllm/vllm-openai:latest
    container_name: vintern-model-service
    restart: unless-stopped
    environment:
      - HF_TOKEN
      - MODEL_ID=${MODEL_ID:-5CD-AI/Vintern-1B-v3_5}
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        pip install sentencepiece --quiet &&
        python -m vllm.entrypoints.openai.api_server \
          --model ${MODEL_ID:-5CD-AI/Vintern-1B-v3_5} \
          --max-model-len 8192 \
          --max-num-batched-tokens 8192 \
          --gpu-memory-utilization 0.80 \
          --max-num-seqs 8 \
          --trust-remote-code \
          --enforce-eager \
          --tensor-parallel-size 1
    shm_size: '8gb'
    ports:
      - "8001:8000"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - ocr-network

networks:
  ocr-network:
    driver: bridge
